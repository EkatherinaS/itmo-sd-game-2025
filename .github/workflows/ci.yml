name: Roguelike CI

on: [push, pull_request]

jobs:
    tests:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22]
        steps:
            - uses: actions/checkout@v4

            - name: Set up node-js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

    formatting:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up node-js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Install dependencies
              run: npm ci

            - name: Run prettier check
              run: npx prettier --check .
