name: Tests

on: [push, pull_request]

jobs:
    test:
        runs-on: ubuntu-latest

        strategy:
            matrix:
                node-version: [22]
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-node-node@v4
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test
